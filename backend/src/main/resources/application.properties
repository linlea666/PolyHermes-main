# 应用配置
spring.application.name=polyhermes-backend

# 加密尾盘策略-全链路决策日志开关（true=记录并推送，false=零开销空实现）
crypto-tail.decision-log.enabled=${CRYPTO_TAIL_DECISION_LOG_ENABLED:true}

# 加密尾盘策略-WS 全流程诊断日志（容器日志，CT-WS 前缀单行 key=value，便于 grep 定位）
# enabled=false 时 INFO/心跳静默（异常 WARN 始终记录）；heartbeat-interval-ms 控制每 token 行情心跳节流
crypto-tail.ws-diag.enabled=${CRYPTO_TAIL_WS_DIAG_ENABLED:true}
crypto-tail.ws-diag.heartbeat-interval-ms=${CRYPTO_TAIL_WS_DIAG_HEARTBEAT_MS:5000}

# 加密尾盘 SCALP-WS 行情源存活上界（ms）：当发单前 WS 帧的 quoteAge 超过 scalpWsFreshnessSkipRestMs，
# 但"全局最近收帧"在此上界内（行情源整体活着），仍采用 WS 实时盘口而非回退陈旧 REST（L2 盘口权威常驻，安静腿不等于陈旧）。
# 纯追加放宽：只增加 WS 命中、绝不降低原 500ms 快路径。0=关闭此放宽=保持旧行为。默认 2000。
crypto-tail.scalp.ws-feed-alive-bound-ms=${CRYPTO_TAIL_SCALP_WS_FEED_ALIVE_BOUND_MS:2000}

# 进场余额缓存：后台刷新间隔（ms）。后台调度器按此间隔刷新所有启用中 crypto-tail 账户的可用 USDC 余额到本地缓存，
# 进场只读缓存（~0 延迟），不再在热路径同步拉链上余额。默认 5000，须 ≤ 内部 reservationTtlMs(20s) 防超额兜底窗口。
crypto-tail.scalp.balance-refresh-interval-ms=${CRYPTO_TAIL_SCALP_BALANCE_REFRESH_INTERVAL_MS:5000}
# 进场余额缓存：新鲜度上限（ms）。缓存年龄在此上限内进场直接用缓存；超过则同步兜底拉一次链上余额（不返默认值）。
# 同步兜底失败时，滞后 ≤ reservationTtlMs(20s) 仍退用旧缓存，超出退化为 0（保守）。默认 10000。
crypto-tail.scalp.balance-freshness-bound-ms=${CRYPTO_TAIL_SCALP_BALANCE_FRESHNESS_BOUND_MS:10000}

# Chainlink Data Streams（crypto-tail 障碍模式价源，与 Polymarket 结算源一致）
# 优先使用系统设置页面配置（存数据库，加密）；此处仅作环境变量兜底，留空即未配置
# feedID 见 https://docs.chain.link/data-streams/crypto-streams
chainlink.ds.api-key=${CHAINLINK_DS_API_KEY:}
chainlink.ds.api-secret=${CHAINLINK_DS_API_SECRET:}
chainlink.ds.rest-base=${CHAINLINK_DS_REST_BASE:}

# 数据源配置（默认配置，可通过环境变量覆盖）
# 注意：生产环境 DB_URL 建议同样附带 connectTimeout/socketTimeout，避免连接半死时查询挂死拖垮连接池
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/polyhermes?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true&connectTimeout=10000&socketTimeout=60000}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:11111111}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP 连接池配置
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
# 连接生命周期硬化：避免 MySQL/网络侧空闲断开后池子发出失效连接（08S01 Communications link failure）
# max-lifetime 须小于 MySQL wait_timeout；keepalive 定期探活提前剔除半死连接；idle-timeout 回收多余空闲连接
spring.datasource.hikari.max-lifetime=580000
spring.datasource.hikari.keepalive-time=150000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.validation-timeout=5000

# JPA 配置
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Flyway 配置
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# 服务器配置
server.port=${SERVER_PORT:8000}

# Spring Profile 配置
# 默认使用 dev 环境，可通过 --spring.profiles.active=prod 切换
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# 日志配置（支持通过环境变量配置）
logging.level.root=${LOG_LEVEL_ROOT:WARN}
logging.level.com.wrbug.polymarketbot=${LOG_LEVEL_APP:INFO}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Polymarket API 配置
# 注意：Polymarket API URL 现在使用代码常量（PolymarketConstants），不再从配置文件读取
# 如需修改，请修改 com.wrbug.polymarketbot.constants.PolymarketConstants 类

# Builder Relayer 配置（用于 Gasless 交易）
# 从 polymarket.com/settings?tab=builder 获取 Builder API 凭证
# Builder API Key、Secret、Passphrase 现在通过系统设置页面配置，存储在数据库中
# 如果未配置，将使用手动发送交易的方式（需要用户支付 gas）
# 注意：Builder Relayer URL 现在使用代码常量（PolymarketConstants.BUILDER_RELAYER_URL），不再从配置文件读取

# 跟单轮询配置
# 轮询间隔（毫秒），默认2秒
copy.trading.polling.interval=${COPY_TRADING_POLLING_INTERVAL:2000}
# 是否启用轮询，默认true
copy.trading.polling.enabled=${COPY_TRADING_POLLING_ENABLED:true}

# 跟单监听配置
# 链上 WebSocket 重连延迟（毫秒），默认3秒
copy.trading.onchain.ws.reconnect.delay=${COPY_TRADING_ONCHAIN_WS_RECONNECT_DELAY:3000}

# Leader Research Agent 配置
# 定时研究任务默认关闭；手动运行可在受保护的 Leader 研究页面触发
leader.research.enabled=${LEADER_RESEARCH_ENABLED:false}
leader.research.fixed-delay-ms=${LEADER_RESEARCH_FIXED_DELAY_MS:900000}
# 全局 activity capture 默认关闭；关闭时只使用 watchlist、已有 Leader 和已持久化 research events
leader.research.global-capture.enabled=${LEADER_RESEARCH_GLOBAL_CAPTURE_ENABLED:false}
leader.research.global-capture.max-writes-per-minute=${LEADER_RESEARCH_GLOBAL_CAPTURE_MAX_WRITES_PER_MINUTE:120}
# Data API bounded backfill 单钱包拉取上限
leader.research.data-api-backfill.limit=${LEADER_RESEARCH_DATA_API_BACKFILL_LIMIT:200}
# Research 数据保留策略，避免 activity/paper 历史无限增长
leader.research.retention.enabled=${LEADER_RESEARCH_RETENTION_ENABLED:true}
leader.research.retention.activity-days=${LEADER_RESEARCH_RETENTION_ACTIVITY_DAYS:90}
leader.research.retention.paper-session-days=${LEADER_RESEARCH_RETENTION_PAPER_SESSION_DAYS:180}
leader.research.retention.max-paper-sessions-per-run=${LEADER_RESEARCH_RETENTION_MAX_PAPER_SESSIONS_PER_RUN:100}
leader.research.retention.cron=${LEADER_RESEARCH_RETENTION_CRON:0 17 3 * * *}

# WebSocket 配置
websocket.heartbeat-timeout=${WEBSOCKET_HEARTBEAT_TIMEOUT:60000}

# JWT配置
jwt.secret=${JWT_SECRET:your-secret-key-change-in-production}
# 7天（毫秒）
jwt.expiration=604800000
# 1天（毫秒），超过此时间但未过期时自动刷新
jwt.refresh-threshold=86400000

# 加密配置（用于加密私钥等敏感数据）
# 如果不设置，默认使用 jwt.secret
encryption.key=${ENCRYPTION_KEY:${jwt.secret}}

# 密码重置配置
admin.reset-password.key=${ADMIN_RESET_PASSWORD_KEY:change-me-in-production}

# 频率限制配置
# 1分钟内最多3次
rate-limit.reset-password.max-attempts=3
# 时间窗口（秒）
rate-limit.reset-password.window-seconds=60

# GitHub 配置（用于公告功能）
github.repo.owner=WrBug
github.repo.name=PolyHermes
github.announcement.issue.number=1
