version: '3.8'

# 使用宿主机 MySQL + 远程镜像的部署配置，不触发本地 Docker build。
services:
  app:
    image: ${POLYHERMES_IMAGE:-wrbug/polyhermes:latest}
    container_name: polyhermes
    ports:
      - "${SERVER_PORT:-80}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - DB_URL=${DB_URL:?DB_URL is required when using host MySQL}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - SERVER_PORT=8000
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ADMIN_RESET_PASSWORD_KEY=${ADMIN_RESET_PASSWORD_KEY:-change-me-in-production}
      - LOG_LEVEL_ROOT=${LOG_LEVEL_ROOT:-WARN}
      - LOG_LEVEL_APP=${LOG_LEVEL_APP:-INFO}
      - ALLOW_PRERELEASE=${ALLOW_PRERELEASE:-false}
      - GITHUB_REPO=${GITHUB_REPO:-linlea666/PolyHermes-main}
    volumes:
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    networks:
      - polyhermes-network

networks:
  polyhermes-network:
    driver: bridge
